<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mana rezervācija — Jordan izpārdošana</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
<style>
  .thread{display:flex;flex-direction:column;height:calc(100vh - 140px);min-height:360px}
  .summary{display:flex;flex-direction:column;gap:6px}
  .summary .row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .summary .price b{font-family:'Anton',sans-serif;font-size:22px}
  .chat{flex:1;background:#F7F7F4;border-top:1.5px solid var(--line);border-bottom:1.5px solid var(--ink)}
  .state{padding:40px 20px;text-align:center}
  .pay{border-top:1.5px solid var(--line);display:flex;flex-direction:column;gap:7px}
  .pay h3{font-family:'Anton',sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:.5px}
  .pay .kv{display:flex;justify-content:space-between;gap:10px;align-items:center;border:1.5px solid var(--ink);padding:7px 10px;background:#F7F7F4}
  .pay .k{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .pay .v{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;word-break:break-all}
  .pay .copy{border:1.5px solid var(--ink);background:var(--card);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 9px;cursor:pointer;flex:0 0 auto}
  .pay .copy:hover{background:var(--marker)}
  .pay .paidbox{border:1.5px solid var(--ink);background:#d8f5df;padding:10px 12px;font-weight:600}
  .pay .hint{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);line-height:1.5}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html">Jordan <span class="hl">čats</span></a>
    <span class="spacer"></span>
    <a class="btn" href="index.html">← Uz veikalu</a>
  </div>
</div>

<div class="wrap">
  <div class="panel" id="card" hidden>
    <div class="pad summary" id="summary"></div>
    <div class="pad pay" id="pay" hidden></div>
    <div class="thread">
      <div class="chat" id="chat" aria-live="polite"></div>
      <form class="composer" id="composer">
        <textarea id="msg" placeholder="Raksti ziņu veikalam…" maxlength="2000" aria-label="Ziņa"></textarea>
        <button class="btn btn-primary" id="send" type="submit">Sūtīt</button>
      </form>
    </div>
  </div>

  <div class="panel" id="notfound" hidden>
    <div class="state">
      <h2 style="font-family:'Anton',sans-serif;text-transform:uppercase">Rezervācija nav atrasta</h2>
      <p class="muted" style="margin-top:8px">Šī saite nav derīga vai rezervācija ir dzēsta.</p>
      <p style="margin-top:16px"><a class="btn btn-primary" href="index.html">← Atpakaļ uz veikalu</a></p>
    </div>
  </div>

  <div class="panel" id="loading">
    <div class="state muted mono">Ielādē…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="payment-config.js"></script>
<script>
const STATUS_LV = {
  chat:'Čats', new:'Jauna', contacted:'Sazinājāmies', reserved:'Rezervēts',
  paid:'Apmaksāts', shipped:'Nosūtīts', cancelled:'Atcelts'
};
const params = new URLSearchParams(location.search);
const token = params.get('t');
const fmt = n => (n==null ? '' : Number(n).toFixed(2).replace('.', ','));
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const timeLv = iso => { try { return new Date(iso).toLocaleString('lv-LV',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); } catch(e){ return ''; } };

const client = (window.getSupabase && window.getSupabase());
let lastCount = -1;
let current = null;

function showOnly(id){
  ['card','notfound','loading'].forEach(x => { document.getElementById(x).hidden = (x !== id); });
}

function renderSummary(d){
  const size = d.size_us ? ('US ' + d.size_us + (d.size_eu ? ' · EU ' + d.size_eu : '')) : 'Izmērs precizējams';
  document.getElementById('summary').innerHTML = `
    <div class="row">
      <span class="mono muted">${esc(d.shoe_style)}</span>
      <span class="badge" data-s="${esc(d.status)}">${esc(STATUS_LV[d.status] || d.status)}</span>
    </div>
    <div style="font-family:'Anton',sans-serif;font-size:20px;text-transform:uppercase;line-height:1.05">${esc(d.shoe_name)}</div>
    <div class="row price">
      <span class="mono">${esc(size)}</span>
      <span class="price">€ <b>${esc(String(d.price))}</b></span>
    </div>
    <div class="mono muted" style="font-size:11.5px">Sveiks, ${esc(d.buyer_name)}! Šeit vari sarakstīties ar veikalu par šo rezervāciju.</div>
  `;
}

// Short bank-transfer reference derived from the private token (matchable in admin).
function payRef(){ return (token || '').replace(/-/g,'').slice(0,6).toUpperCase(); }
function renderPay(d){
  const el = document.getElementById('pay');
  const PAY = window.PAY || {};
  const payable = PAY.enabled && d.shoe_style !== 'CHAT' && d.price != null && d.status !== 'cancelled';
  if (!payable){ el.hidden = true; el.innerHTML = ''; return; }
  el.hidden = false;
  if (d.status === 'paid'){
    el.innerHTML = `<div class="paidbox">✓ Apmaksāts — paldies! Par piegādi sazināsimies čatā zemāk.</div>`;
    return;
  }
  const ref = payRef();
  el.innerHTML = `
    <h3>Apmaksa — bankas pārskaitījums</h3>
    <div class="kv"><div><div class="k">Summa</div><div class="v">€${esc(fmt(d.price))}</div></div></div>
    <div class="kv"><div><div class="k">IBAN</div><div class="v">${esc(PAY.iban)}</div></div><button class="copy" data-copy="${esc(PAY.iban)}">Kopēt</button></div>
    ${PAY.recipient ? `<div class="kv"><div><div class="k">Saņēmējs</div><div class="v">${esc(PAY.recipient)}</div></div></div>` : ''}
    ${PAY.bank ? `<div class="kv"><div><div class="k">Banka</div><div class="v">${esc(PAY.bank)}</div></div></div>` : ''}
    <div class="kv"><div><div class="k">Atsauce (obligāti)</div><div class="v">${esc(ref)}</div></div><button class="copy" data-copy="${esc(ref)}">Kopēt</button></div>
    <p class="hint">Pārskaiti summu uz norādīto IBAN, <b>obligāti norādot atsauci ${esc(ref)}</b> maksājuma mērķī. Kad nauda saņemta, apstiprināsim čatā.${PAY.note ? ' ' + esc(PAY.note) : ''}</p>`;
}
document.getElementById('pay').addEventListener('click', e => {
  const b = e.target.closest('.copy'); if (!b) return;
  const t = b.getAttribute('data-copy');
  if (navigator.clipboard){ navigator.clipboard.writeText(t).catch(()=>{}); const o = b.textContent; b.textContent = 'Nokopēts ✓'; setTimeout(() => b.textContent = o, 1500); }
});

function renderChat(msgs){
  const chat = document.getElementById('chat');
  if (!msgs.length){
    chat.innerHTML = `<div class="msg system">Uzraksti mums izmēru apstiprinājumu, pakomātu vai jautājumus — atbildēsim šeit.</div>`;
    return;
  }
  const nearBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 60;
  chat.innerHTML = msgs.map(m => `
    <div class="msg ${m.sender === 'admin' ? 'admin' : 'buyer'}">
      ${esc(m.body)}
      <div class="meta">${m.sender === 'admin' ? 'Veikals' : 'Tu'} · ${esc(timeLv(m.created_at))}</div>
    </div>`).join('');
  if (nearBottom) chat.scrollTop = chat.scrollHeight;
}

async function load(){
  if (!token || !client){ showOnly('notfound'); return; }
  const { data, error } = await client.rpc('get_thread', { p_token: token });
  if (error){ console.error(error); return; }
  if (!data){ showOnly('notfound'); return; }
  current = data;
  showOnly('card');
  renderSummary(data);
  renderPay(data);
  const msgs = data.messages || [];
  if (msgs.length !== lastCount){ renderChat(msgs); lastCount = msgs.length; }
  else { // status may still change without new messages
    document.querySelector('#summary .badge')?.setAttribute('data-s', data.status);
  }
}

document.getElementById('composer').addEventListener('submit', async e => {
  e.preventDefault();
  const ta = document.getElementById('msg');
  const body = ta.value.trim();
  if (!body || !client) return;
  const btn = document.getElementById('send');
  btn.disabled = true;
  try {
    const { error } = await client.rpc('post_message', { p_token: token, p_body: body });
    if (error) throw error;
    ta.value = '';
    lastCount = -1;      // force re-render
    await load();
  } catch(err){ console.error(err); alert('Neizdevās nosūtīt ziņu. Mēģini vēlreiz.'); }
  finally { btn.disabled = false; ta.focus(); }
});
// Enter to send, Shift+Enter for newline
document.getElementById('msg').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); document.getElementById('composer').requestSubmit(); }
});

if (!client){ showOnly('notfound'); }
else {
  load();
  setInterval(() => { if (!document.hidden) load(); }, 3000);
}
</script>
</body>
</html>
